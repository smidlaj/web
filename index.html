<!doctype html>
<html lang="hu">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Photo gallery</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <!-- Content warning / landing gate -->
  <div id="gate" class="gate hidden" aria-hidden="true">
    <div class="gate__bg"></div>
    <div class="gate__content" role="dialog" aria-modal="true">
      <h1 data-i18n="gateTitle">Figyelmeztetés</h1>
      <p data-i18n="gateText"></p>
      <div class="gate__buttons">
        <button id="gateAccept" class="gate__imgbtn" type="button">
          <img id="gateAcceptImg" alt="" />
        </button>
        <button id="gateDecline" class="gate__imgbtn" type="button">
          <img id="gateDeclineImg" alt="" />
        </button>
      </div>
    </div>
  </div>

  <!-- Main app -->
  <div id="app" class="app" hidden>
    <aside id="sidebar" class="sidebar">
      <div class="sidebar__top">
        <div class="lang" aria-label="Language">
          <button class="lang__btn" type="button" data-lang="en">English</button>
          <button class="lang__btn" type="button" data-lang="hu">Magyar</button>
        </div>
      </div>

      <div class="sidebar__section">
        <h2 data-i18n="albums">Albumok</h2>
        <div id="albumList" class="sidebar__list" aria-label="Albums"></div>
      </div>

      <div class="sidebar__section">
        <h2 data-i18n="series">Sorozatok</h2>
        <div id="seriesSidebarList" class="sidebar__list" aria-label="Series"></div>
      </div>
    </aside>

    <div class="main">
      <header class="topbar">
        <button id="hamburger" class="hamburger" type="button" aria-label="Menu">☰</button>
        <input id="search" class="search" type="search" placeholder="" autocomplete="off" />
      </header>

      <main>
        <div id="subheader" class="subheader"></div>
        <div id="grid" class="grid"></div>
        <div id="pagination" class="pagination" aria-label="Pagination"></div>
      </main>
    </div>
  </div>

  <!-- Lightbox viewer -->
  <div id="lightbox" class="lightbox hidden" aria-hidden="true">
    <button id="lbClose" class="lightbox__close" type="button" aria-label="Close">×</button>
    <button id="lbPrev" class="lightbox__nav lightbox__nav--prev" type="button" aria-label="Previous">◀</button>

    <figure class="lightbox__figure">
      <img id="lbImage" alt="" draggable="false" />
      <figcaption id="lbCaption"></figcaption>
    </figure>

    <button id="lbNext" class="lightbox__nav lightbox__nav--next" type="button" aria-label="Next">▶</button>
  </div>

  <script src="js/config.js"></script>
  <script src="js/app.js" defer></script>
</body>
</html>
